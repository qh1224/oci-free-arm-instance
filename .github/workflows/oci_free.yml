name: Try to Create OCI VM

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  run-oci-cli:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install and Run OCI Task
        env:
          OCI_USER: ${{ secrets.OCI_CLI_USER }}
          OCI_TENANCY: ${{ secrets.OCI_CLI_TENANCY }}
          OCI_REGION: ${{ secrets.OCI_CLI_REGION }}
          OCI_FINGERPRINT: ${{ secrets.OCI_CLI_FINGERPRINT }}
          OCI_KEY: ${{ secrets.OCI_CLI_KEY_CONTENT }}
          AD_NAME: ${{ secrets.AD_NAME }}
          COMPARTMENT_ID: ${{ secrets.OCI_COMPARTMENT_ID }}
          IMAGE_ID: ${{ secrets.IMAGE_ID }}
          SUBNET_ID: ${{ secrets.OCI_SUBNET_ID }}
          SSH_KEY: ${{ secrets.SSH_PUBLIC_KEY }}
        run: |
          # 1. 安装 OCI CLI
          bash -c "$(curl -L https://raw.githubusercontent.com/oracle/oci-cli/master/scripts/install/install.sh)" -- --accept-all-defaults
          export PATH=$PATH:/home/runner/bin
          
          # 2. 写入配置文件
          mkdir -p ~/.oci
          echo "$OCI_KEY" > ~/.oci/oci_api_key.pem
          chmod 600 ~/.oci/oci_api_key.pem
          
          cat << EOF > ~/.oci/config
          [DEFAULT]
          user=$OCI_USER
          fingerprint=$OCI_FINGERPRINT
          key_file=~/.oci/oci_api_key.pem
          tenancy=$OCI_TENANCY
          region=$OCI_REGION
          EOF
          
          # 3. 发起请求并强行把结果直接打印出来
          echo "=========================================="
          echo "▶▶▶ 甲骨文真实返回结果如下 ◀◀◀"
          echo "=========================================="
          
          /home/runner/bin/oci compute instance launch \
            --availability-domain "$AD_NAME" \
            --compartment-id "$COMPARTMENT_ID" \
            --shape "VM.Standard.A1.Flex" \
            --shape-config '{"ocpus":2,"memoryInGBs":12}' \
            --image-id "$IMAGE_ID" \
            --subnet-id "$SUBNET_ID" \
            --ssh-authorized-keys "$SSH_KEY" \
            --assign-public-ip true \
            --display-name "chunchuan-arm-vm" \
            --boot-volume-size-in-gbs 100
