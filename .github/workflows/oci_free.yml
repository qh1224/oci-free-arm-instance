name: Try to Create OCI VM

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  run-oci-cli:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install and Run OCI Task
        env:
          OCI_USER: ${{ secrets.OCI_CLI_USER }}
          OCI_TENANCY: ${{ secrets.OCI_CLI_TENANCY }}
          OCI_REGION: ${{ secrets.OCI_CLI_REGION }}
          OCI_FINGERPRINT: ${{ secrets.OCI_CLI_FINGERPRINT }}
          OCI_KEY: ${{ secrets.OCI_CLI_KEY_CONTENT }}
          AD_NAME: ${{ secrets.AD_NAME }}
          COMPARTMENT_ID: ${{ secrets.OCI_COMPARTMENT_ID }}
          IMAGE_ID: ${{ secrets.IMAGE_ID }}
          SUBNET_ID: ${{ secrets.OCI_SUBNET_ID }}
          SSH_KEY: ${{ secrets.SSH_PUBLIC_KEY }}
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          # 1. 安装 OCI CLI
          bash -c "$(curl -L https://raw.githubusercontent.com/oracle/oracle-cli/master/scripts/install/install.sh)" -- --accept-all-defaults || bash -c "$(curl -L https://raw.githubusercontent.com/oracle/oci-cli/master/scripts/install/install.sh)" -- --accept-all-defaults
          export PATH=$PATH:/home/runner/bin
          
          # 2. 写入认证配置
          mkdir -p ~/.oci
          echo "$OCI_KEY" > ~/.oci/oci_api_key.pem
          chmod 600 ~/.oci/oci_api_key.pem
          
          CLEAN_USER=$(echo -n "$OCI_USER" | tr -d '[:space:]=')
          CLEAN_FINGERPRINT=$(echo -n "$OCI_FINGERPRINT" | tr -d '[:space:]=')
          CLEAN_TENANCY=$(echo -n "$OCI_TENANCY" | tr -d '[:space:]=')
          CLEAN_REGION=$(echo -n "$OCI_REGION" | tr -d '[:space:]=')
          
          cat << EOF > ~/.oci/config
          [DEFAULT]
          user=$CLEAN_USER
          fingerprint=$CLEAN_FINGERPRINT
          key_file=~/.oci/oci_api_key.pem
          tenancy=$CLEAN_TENANCY
          region=$CLEAN_REGION
          EOF
          
          chmod 600 ~/.oci/config
          
          # 3. 极致脱水清洗公钥
          printf "%s" "$SSH_KEY" | xargs > ~/.oci/ssh_authorized_keys.pub
          
          # 4. 究极过滤：剥离一切回车、换行、空格和等号
          V_AD=$(echo -n "$AD_NAME" | tr -d '[:space:]=')
          V_COMP=$(echo -n "$COMPARTMENT_ID" | tr -d '[:space:]=')
          V_IMAGE=$(echo -n "$IMAGE_ID" | tr -d '[:space:]=')
          V_SUBNET=$(echo -n "$SUBNET_ID" | tr -d '[:space:]=')
          
          export OCI_CLI_SUPPRESS_FILE_PERMISSIONS_WARNING=True
          export SUPPRESS_LABEL_WARNING=True
          
          # 5. 发起顶配冲锋！(已永久移除 --debug 调试，防止污染日志)
          /home/runner/bin/oci compute instance launch \
            --availability-domain "$V_AD" \
            --compartment-id "$V_COMP" \
            --shape "VM.Standard.A1.Flex" \
            --shape-config '{"ocpus":4,"memoryInGBs":24}' \
            --subnet-id "$V_SUBNET" \
            --ssh-authorized-keys-file ~/.oci/ssh_authorized_keys.pub \
            --assign-public-ip true \
            --display-name "chunchuan-arm-vm-max" \
            --source-details '{"sourceType": "image", "imageId": "'"$V_IMAGE"'", "bootVolumeSizeInGBs": 200}' \
            > oci_success.log 2> oci_error.log || true

          # 6. 推送 Discord 战报 (双重严谨判断)
          if [ -s oci_success.log ] && grep -q "\"id\"" oci_success.log; then
            # 只有抓到了实打实的 JSON ID，才敢报喜！
            curl -F "content=🚀 【韩国春川】4核24G 顶配 ARM 实例真·抢到了！！！快点开附件查看它的 JSON 档案！" \
                 -F "file1=@oci_success.log" \
                 "$DISCORD_WEBHOOK"
          else
            if grep -qiE "capacity|TooManyRequests|LimitExceeded|500" oci_error.log; then
              MSG="⏳ 【韩国春川】4核24G暗号就位，日夜排队冲锋中... (Out of host capacity)"
            else
              MSG="❌ 【韩国春川】请求被拦截，请回 GitHub 查看 oci_error.log 寻找原因！"
            fi
            
            # 排队状态推送纯文本
            curl -H "Content-Type: application/json" \
                 -X POST \
                 -d "{\"content\": \"$MSG\"}" \
                 "$DISCORD_WEBHOOK"
          fi
