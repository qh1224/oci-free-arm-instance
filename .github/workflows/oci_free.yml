name: Try to Create OCI VM

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  run-oci-cli:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install and Run OCI Task
        env:
          OCI_USER: ${{ secrets.OCI_CLI_USER }}
          OCI_TENANCY: ${{ secrets.OCI_CLI_TENANCY }}
          OCI_REGION: ${{ secrets.OCI_CLI_REGION }}
          OCI_FINGERPRINT: ${{ secrets.OCI_CLI_FINGERPRINT }}
          OCI_KEY: ${{ secrets.OCI_CLI_KEY_CONTENT }}
          AD_NAME: ${{ secrets.AD_NAME }}
          COMPARTMENT_ID: ${{ secrets.OCI_COMPARTMENT_ID }}
          IMAGE_ID: ${{ secrets.IMAGE_ID }}
          SUBNET_ID: ${{ secrets.OCI_SUBNET_ID }}
          SSH_KEY: ${{ secrets.SSH_PUBLIC_KEY }}
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          # 1. 安装 OCI CLI
          bash -c "$(curl -L https://raw.githubusercontent.com/oracle/oci-cli/master/scripts/install/install.sh)" -- --accept-all-defaults
          export PATH=$PATH:/home/runner/bin
          
          # 2. 写入认证配置
          mkdir -p ~/.oci
          echo "$OCI_KEY" > ~/.oci/oci_api_key.pem
          chmod 600 ~/.oci/oci_api_key.pem
          
          cat << EOF > ~/.oci/config
          [DEFAULT]
          user=$OCI_USER
          fingerprint=$OCI_FINGERPRINT
          key_file=~/.oci/oci_api_key.pem
          tenancy=$OCI_TENANCY
          region=$OCI_REGION
          EOF
          
          # 3. 准备公钥
          echo "$SSH_KEY" > ~/.oci/ssh_authorized_keys.pub
          
          # 4. 发起冲锋（设置 30 秒超时强退，防止死卡排队，直接去抓结果）
          export SUPPRESS_LABEL_WARNING=True
          timeout 30s /home/runner/bin/oci compute instance launch \
            --availability-domain "$AD_NAME" \
            --compartment-id "$COMPARTMENT_ID" \
            --shape "VM.Standard.A1.Flex" \
            --shape-config '{"ocpus":2,"memoryInGBs":12}' \
            --image-id "$IMAGE_ID" \
            --subnet-id "$SUBNET_ID" \
            --ssh-authorized-keys-file ~/.oci/ssh_authorized_keys.pub \
            --assign-public-ip true \
            --display-name "chunchuan-arm-vm" \
            --boot-volume-size-in-gbs 100 > oci_success.log 2> oci_error.log || true

          # 5. 强制输出到 GitHub 日志，让你一眼看清死因
          echo "=========================================="
          echo "▶▶▶ 甲骨文当前真实对线情况如下 ◀◀◀"
          echo "=========================================="
          if [ -s oci_success.log ]; then
            cat oci_success.log
          elif [ -s oci_error.log ]; then
            cat oci_error.log
          else
            echo "⚠️ 刚才排队卡死超时了，或者是 Discord Webhook 格式内鬼，请看下方推送状态。"
          fi

          # 6. 强行推送 Discord 战报
          if [ -s oci_success.log ]; then
            MSG="🚀 【韩国春川】ARM 实例抢到了！！！快去 GitHub 关闭 Actions 脚本！"
            DATA=$(cat oci_success.log | jq -R -s '.')
          else
            MSG="❌ 【韩国春川】尝试冲锋返回。日志详情："
            DATA=$(cat oci_error.log | jq -R -s '.')
          fi
          
          curl -H "Content-Type: application/json" \
               -X POST \
               -d "{\"content\": \"$MSG\n\`\`\`json\n$DATA\n\`\`\`\"}" \
               "$DISCORD_WEBHOOK"
